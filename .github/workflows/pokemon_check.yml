name: Rebel Restock Monitor (Continuous)

on:
  schedule:
    # Runs every 30 minutes (e.g., 00:00, 00:30, 01:00, 01:30...)
    - cron: '*/30 * * * *'
  
  workflow_dispatch: 

# Cancels the previous 30-minute run exactly as the new one starts
concurrency:
  group: restock-monitor
  cancel-in-progress: true 

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager selenium-stealth requests python-dotenv

      - name: Run Restock Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REBEL_ACCOUNT_PASS: ${{ secrets.REBEL_ACCOUNT_PASS }}
          REBEL_ACCOUNT_EMAIL: ${{ secrets.REBEL_ACCOUNT_EMAIL }}
          STREET: ${{ secrets.STREET }}
          CITY: ${{ secrets.CITY }}
          ZIP: ${{ secrets.ZIP }}
          PHONE: ${{ secrets.PHONE }}
        run: python main.py
